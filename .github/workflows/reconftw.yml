name: ReconFTW Automation

on:
  workflow_dispatch:
  push:
    paths:
      - 'target.txt'

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl wget git python3 python3-pip \
            jq gcc make libpcap-dev \
            dnsutils whois nmap ruby-full

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install ReconFTW
        run: |
          git clone --depth 1 https://github.com/six2dez/reconftw.git
          cd reconftw
          chmod +x install.sh
          ./install.sh
          cd ..

      # Disable slow modules, keep GXSS and BRUTESPRAY
      - name: Configure ReconFTW
        run: |
          cd reconftw
          sed -i 's/SUBBRUTE=true/SUBBRUTE=false/' reconftw.cfg
          sed -i 's/GOTATOR=true/GOTATOR=false/' reconftw.cfg
          sed -i 's/S3SCANNER=true/S3SCANNER=false/' reconftw.cfg

      - name: Telegram — Recon Started
        run: |
          TARGETS=$(cat target.txt | grep -v '^#' | grep -v '^$' | tr '\n' ', ')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚀 *ReconFTW Started*\n\n📋 *Targets:* \`${TARGETS}\`\n🔧 *Run ID:* \`${{ github.run_id }}\`\n⏱️ *Time:* $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Run ReconFTW on All Targets
        run: |
          cd reconftw
          mkdir -p ../results

          while IFS= read -r target || [[ -n "$target" ]]; do
            [[ -z "$target" || "$target" == \#* ]] && continue

            echo "==============================="
            echo "  Starting recon on: $target"
            echo "==============================="

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="Markdown" \
              -d text="🔍 *Scanning:* \`${target}\`"

            ./reconftw.sh -d "$target" -r 2>&1 | tee -a "../results/${target}_recon.log" || true

            SUBDOMAINS=$(grep -c "subdomain" "../results/${target}_recon.log" 2>/dev/null || echo "0")
            URLS=$(grep -c "http" "../results/${target}_recon.log" 2>/dev/null || echo "0")

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="Markdown" \
              -d text="✅ *Done:* \`${target}\`\n\n📊 *Quick Stats:*\n• Subdomain hits in log: \`${SUBDOMAINS}\`\n• URL hits in log: \`${URLS}\`"

            LOGFILE="../results/${target}_recon.log"
            FILESIZE=$(stat -c%s "$LOGFILE" 2>/dev/null || echo 0)

            if [ "$FILESIZE" -lt 52428800 ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
                -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -F document=@"$LOGFILE" \
                -F caption="📄 Full log for ${target}"
            else
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="⚠️ Log for ${target} is too large for Telegram. Download from GitHub Artifacts."
            fi

          done < "../target.txt"

      - name: Upload Recon Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: recon-results-${{ github.run_id }}
          path: |
            results/
            reconftw/Recon/
          retention-days: 30

      - name: Telegram — All Done
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🏁 *ReconFTW Complete!*\n\n📦 Download all results here:\n[GitHub Actions Run](${RUN_URL})\n\n⏱️ Finished: $(date -u '+%Y-%m-%d %H:%M UTC')"
